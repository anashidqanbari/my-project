<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>هفت پیکر | افلاک زمین‌مرکزی</title>

  <style>
    body {
      margin: 0;
      font-family:'iranyekan', Tahoma, sans-serif;
      background: radial-gradient(circle at top, #0b1020, #000);
      color: white;
      overflow-x: hidden;
    }

    header {
      text-align: center;
      padding: 25px 10px 10px;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
      color: #ffd36b;
      text-shadow: 0 0 10px rgba(255, 211, 107, 0.4);
    }

    header p {
      margin-top: 10px;
      opacity: 0.85;
      font-size: 14px;
    }

    /* صحنه افلاک */
    .cosmos {
      width: 100%;
      max-width: 1100px;
      margin: 20px auto;
      position: relative;
      height: 420px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0,0,0,0.7);
    }

    .stars {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(#fff 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      animation: starsMove 20s linear infinite;
    }

    @keyframes starsMove {
      from { transform: translateY(0); }
      to { transform: translateY(60px); }
    }

    /* زمین در مرکز */
    .earth {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 95px;
      height: 95px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, #aeefff, #2c74ff, #00308a);
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.6);
      z-index: 5;
    }

    .earthLabel {
      position: absolute;
      top: calc(50% + 58px);
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      opacity: 0.85;
      z-index: 6;
    }

    /* مدارها */
    .orbit {
      position: absolute;
      top: 50%;
      left: 50%;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.2);
      transform: translate(-50%, -50%);
    }
    @font-face {
  font-family: 'iranyekan';
  src: url('font/iranyekan.ttf') format('truetype');
}

    .orbit .planet {
      position: absolute;
      top: 50%;
      left: 0;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    .spin { animation: spin 14s linear infinite; }
    .spinSlow { animation: spin 22s linear infinite; }
    .spinFast { animation: spin 9s linear infinite; }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* بهرام */
    .bahram {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      font-size: 34px;
      transition: all 1.2s ease;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
    }

    /* کارت‌های گنبد */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 18px;
      padding: 20px;
      max-width: 1100px;
      margin: auto;
    }

    .dome {
      border-radius: 18px;
      padding: 16px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      border: 1px solid rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
      min-height: 170px;
    }

    .dome:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 25px rgba(255,255,255,0.2);
    }

    .dome::before {
      content: "";
      position: absolute;
      top: -60px;
      left: -60px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      filter: blur(20px);
    }

    .dome h2 {
      margin: 0;
      font-size: 18px;
      z-index: 2;
      position: relative;
    }

    .dome .mini {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.9;
      line-height: 1.8;
      z-index: 2;
      position: relative;
    }

    /* پنل اطلاعات پایین */
    .panel {
      max-width: 1100px;
      margin: 20px auto 50px;
      padding: 20px;
      border-radius: 18px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .panel img {
      width: 180px;
      height: 230px;
      border-radius: 18px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    .panelContent {
      flex: 1;
      min-width: 240px;
    }

    .panel h3 {
      margin: 0;
      font-size: 20px;
      color: #7be7ff;
    }

    .panel pre {
      background: rgba(0,0,0,0.55);
      padding: 16px;
      border-radius: 14px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.8;
      border: 1px solid rgba(255,255,255,0.12);
      margin-top: 14px;
    }

    .panel .info {
      margin-top: 12px;
      line-height: 2;
      font-size: 14px;
      opacity: 0.95;
    }

    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      font-size: 12px;
      margin: 6px 4px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    footer {
      text-align: center;
      padding: 20px;
      opacity: 0.7;
      font-size: 12px;
    }

    /* رنگ‌ها */
    .black { background: linear-gradient(135deg, #000, #222); }
    .sand  { background: linear-gradient(135deg, #d2b48c, #a98c58); color: #111; }
    .red   { background: linear-gradient(135deg, #ff2a2a, #7a0000); }
    .gold  { background: linear-gradient(135deg, #ffda3a, #b17800); color: #111; }
    .white { background: linear-gradient(135deg, #fff, #cfcfcf); color: #111; }
    .cyan  { background: linear-gradient(135deg, #00d5ff, #006b7e); }
    .green { background: linear-gradient(135deg, #4cff4c, #0c6f0c); }

    .sand h2, .sand .mini,
    .gold h2, .gold .mini,
    .white h2, .white .mini {
      color: #111;
    }
  </style>
</head>

<body>

<header>
  <h1>هفت پیکر</h1>
  <p>زمین مرکز است و هفت فلک پیرامون آن می‌چرخند. کارت‌ها دقیقاً بر اساس روزهای هفته مرتب‌اند.</p>
</header>

<section class="cosmos">
  <div class="stars"></div>

  <div class="earth"></div>
  <div class="earthLabel">🌍 زمین (مرکز افلاک)</div>

  <div id="orbits"></div>
  <div class="bahram" id="bahram">👑</div>
</section>

<section class="container" id="domes"></section>

<section class="panel">
  <img id="ladyImg" src="" alt="تصویر بانو" style="display:none;">
  <div class="panelContent">
    <h3 id="panelTitle">📌 انتخاب کن...</h3>
    <div class="info" id="panelInfo">
      روی یکی از گنبدها کلیک کن تا تصویر بانو + اطلاعات + کد نمایش داده شود.
    </div>
    <pre id="codeBlock">// انتخاب گنبد...</pre>
  </div>
</section>

<footer>
  ساخته شده توسط Anashid Qanbari
</footer>

<script>
  // ترتیب دقیق کارت‌ها بر اساس روزهای هفته:
  // شنبه → دوشنبه → سه‌شنبه → چهارشنبه → پنجشنبه → جمعه → یکشنبه

  const domesData = [
    {
      colorClass: "black",
      dome: "گنبد سیاه",
      planet: "زحل (کیوان)",
      falak: "فلک هفتم (دورترین)",
      day: "شنبه",
      lady: "فورک (بانوی هند)",
      hex: "سیاه",
      planetColor: "#cccccc",
      orbitSize: 360,
      verses: `
      هر که در کام دل شتاب کند / کار خود را به خود خراب کند  
      صبر کن کاین عجوزهٔ فریب / ناگهان پیر گردد از نشیب 

`,
      ladyImg: "images/lady1.png",
      advice:"بی‌صبری و تسلیم شدن به شهوت، انسان را از نعمت واقعی محروم می‌کند.",
      story: "شاهی مهمان سیاه‌پوشی می‌بیند و کنجکاو می‌شود راز او را بفهمد. به «شهر مدهوشان» می‌رود، به باغی جادویی می‌رسد و با بانویی فوق‌العاده زیبا روبه‌رو می‌شود. هر شب به او وعده وصال می‌دهد اما به تعویق می‌اندازد. مرد صبر نمی‌کند و اصرار می‌کند؛ ناگهان همه‌چیز ناپدید می‌شود و خودش را دوباره در همان وضعیت اول می‌بیند. بعد می‌فهمد همه آن مردم هم همین تجربه را داشتند و به همین خاطر سیاه‌پوش شده‌اند."
    },
    {
      colorClass: "gold",
      dome: "گنبد زرین",
      planet: "خورشید (شمس)",
      falak: "فلک چهارم",
      day: "یکشنبه",
      lady: "همایون‌رای (دختر قیصر روم)",
      hex: "زرد",
      planetColor: "#ffd700",
      orbitSize: 240,
      verses: `
      راستی را بنای کار بود / کژروی مایهٔ ملال و جفا بود
    هر که با راستی قرین گردد / در دو عالم عزیز و دین گردد

`,
      ladyImg: "images/lady2.png",
      story: "پادشاهی از زنان دل‌زده است چون همه ناسپاس‌اند. کنیزکی پاک و وفادار می‌خرد که از وصال می‌ترسد چون فکر می‌کند باعث مرگش می‌شود. شاه هم صبور است. با حیله‌ای حسادت او را بیدار می‌کند، حقیقت‌ها را به هم می‌گویند، سوءتفاهم برطرف می‌شود و به وصال می‌رسند—و برخلاف ترس، اتفاق بدی نمی‌افتد.",
      advice:"راستی، صبر و وفاداری پایه عشق واقعی‌اند؛ ترس و سوءظن مانع خوشبختی‌اند."
    },
    {
      colorClass: "green",
      dome: "گنبد سبز",
      planet: "ماه",
      falak: "فلک اول (نزدیک‌ترین)",
      day: "دوشنبه",
      lady: "نازپری (دختر خوارزم‌شاه)",
      hex: "سبز",
      planetColor: "#55ff55",
      orbitSize: 120,
      verses: `
      هر که با نفس خویش جنگ کند / فتح اقلیم نام و ننگ کند
       صبر چون پیشه کرد مرد خرد / آخرش کام دل به دست آورد

`,
      ladyImg: "images/lady3.png",
      story: "مردی پارسا (بشر) دل به زنی می‌بازد ولی چون زن شوهر دارد، خودش را از گناه دور می‌کند و به حج می‌رود. در راه با مردی مغرور (ملیخا) همراه می‌شود که دائم همه‌چیز را انکار می‌کند و بدبین است. در نهایت همان بدبینی باعث هلاکتش می‌شود. بشر امانت‌دار و درستکار باقی می‌ماند و در نهایت همان زن (که حالا بیوه شده) به‌صورت حلال نصیبش می‌شود.",
      advice:"پرهیزکاری و درستکاری در نهایت به خیر می‌رسد؛ بدبینی و غرور آدم را نابود می‌کند."
    },
    {
      colorClass: "red",
      dome: "گنبد سرخ",
      planet: "مریخ",
      falak: "فلک پنجم",
      day: "سه‌شنبه",
      lady: "نسرین نوش (بانوی سقلاب)",
      hex: "سرخ",
      planetColor: "#ff3333",
      orbitSize: 280,
      verses: `
      راه عشق ارچه پر ز خون جگر است / عقل باید که رهبر سفر است
        هر که بی‌فکر در ره افتد پیش / خود فتد در کمند خویش

`,
      ladyImg: "images/lady4.png",
      story: "دختری دانا در قلعه‌ای پر از طلسم زندگی می‌کند و شرط‌های سختی برای ازدواج می‌گذارد. شاهزاده‌ای با یادگیری و تدبیر از همه آزمون‌ها عبور می‌کند. در مرحله آخر با نشانه‌ها (مروارید، شکر، شیر...) با هم گفتگو رمزی می‌کنند و فهم و هم‌سطح بودنشان را نشان می‌دهند. دختر می‌پذیرد و ازدواج می‌کنند.",
      advice:"عشق واقعی فقط احساس نیست؛ فهم، خرد و شایستگی هم لازم دارد."
    },
    {
      colorClass: "cyan",
      dome: "گنبد فیروزه‌ای",
      planet: "عطارد",
      falak: "فلک دوم",
      day: "چهارشنبه",
      lady: "آذریون (دختر شاه مغرب)",
      hex: "فیروزه ای",
      planetColor: "#00d5ff",
      orbitSize: 160,
      verses: `
      هر که فریب ظاهر خورد / آخرش زان فریب رنجه شود
     چون به حق بازگشت مرد رهی / از همه دام‌ها برنجه شود

`,
      ladyImg: "images/lady5.png",
      story: "ماهان فریب مردی را می‌خورد و به بیابان دیوها می‌افتد. بارها با ظاهرهای فریبنده (دوست، نجات‌دهنده، حوری) گول می‌خورد اما هر بار می‌بیند حقیقت چیز دیگری است. در نهایت با توبه و پناه بردن به خدا نجات پیدا می‌کند و به جای اولش برمی‌گردد.",
      advice:"ظاهر فریبنده‌ست؛ اعتماد بی‌جا و طمع انسان را به هلاکت می‌کشاند، نجات در بیداری و توبه است."
    },
    {
      colorClass: "sand",
      dome: "گنبد صندل",
      planet: "مشتری",
      falak: "فلک ششم",
      day: "پنجشنبه",
      lady: "یغما ناز (دختر خاقان چین)",
      hex: "خاکی",
      planetColor: "#ffdd99",
      orbitSize: 320,
      verses: `
      نیکویی گرچه دیر بنماید / آخرش کام دل بیاراید
    بد کند هر که تخم بد بکِشت / جز پشیمانی از آن برنچید

`,
      ladyImg: "images/lady6.png",
      story: "دو نفر (خیر و شر) هم‌سفرند. شر آب را پنهان می‌کند و در نهایت در ازای آب، چشم‌های خیر را می‌گیرد و رهایش می‌کند. خیر با کمک دختری نجات پیدا می‌کند، بینایی‌اش برمی‌گردد، به مقام و ثروت می‌رسد. در نهایت شر را پیدا می‌کند و مجازاتش می‌کند.",
      advice:"نیکی اگر اولش سختی باشد آخرش به پاداش می‌رسد؛ بدی بالاخره به خودش برمی‌گردد."
    },
    {
      colorClass: "white",
      dome: "گنبد سفید",
      planet: "ناهید (زهره)",
      falak: "فلک سوم",
      day: "جمعه",
      lady: "دُرستی (دختر کسرا)",
      hex: "سفید",
      planetColor: "#ffffff",
      orbitSize: 200,
      verses: `
      ای بسا رنج‌ها که راحت بود / رنج پنداشتند و نعمت بود
        هر که خود را ز بد نگه دارد / عاقبت نیک‌بخت برآید

`,
      ladyImg: "images/lady7.png",
      story: "جوانی پارسا وارد باغ خودش می‌شود و با کنیزکان زیبا روبه‌رو می‌شود. چند بار تا مرز گناه پیش می‌رود، اما هر بار اتفاقی مانع می‌شود. در نهایت می‌فهمد این‌ها لطف الهی بوده تا از گناه حفظ شود. توبه می‌کند و بعد به‌صورت حلال با همان دختر ازدواج می‌کند.",
      advice:"گاهی موانع، لطف خدا هستند؛ پاکی ارزشمندتر از لذت زودگذر است."
    },
   
  ];

  const domesContainer = document.getElementById("domes");
  const orbitsContainer = document.getElementById("orbits");
  const bahram = document.getElementById("bahram");

  const panelTitle = document.getElementById("panelTitle");
  const panelInfo = document.getElementById("panelInfo");
  const codeBlock = document.getElementById("codeBlock");
  const ladyImg = document.getElementById("ladyImg");

  function generateCode(d) {
    return `
   
        بقول آقامون نظامی: ${d.verses}
     
 `;
  }

  // ساخت مدارها
  domesData.forEach((d, index) => {
    const orbit = document.createElement("div");
    orbit.className = "orbit spin";
    orbit.style.width = d.orbitSize + "px";
    orbit.style.height = d.orbitSize + "px";

    if (index % 3 === 0) orbit.classList.add("spinSlow");
    if (index % 3 === 1) orbit.classList.add("spinFast");

    const planet = document.createElement("div");
    planet.className = "planet";
    planet.style.background = d.planetColor;

    orbit.appendChild(planet);
    orbitsContainer.appendChild(orbit);
  });

  // ساخت کارت‌ها
  domesData.forEach((d) => {
    const div = document.createElement("div");
    div.className = `dome ${d.colorClass}`;

    div.innerHTML = `
      <h2>${d.day}</h2>
      <div class="mini">
        <div>🏛 ${d.dome}</div>
        <div>🪐 ${d.planet}</div>
        <div>👑 ${d.lady}</div>
      </div>
    `;

    div.addEventListener("click", () => selectDome(d));
    domesContainer.appendChild(div);
  });

  // حرکت بهرام روی مدار
  function moveBahramToOrbit(size) {
    const percentX = 50 + (size / 2) / 11;
    const percentY = 50;

    bahram.style.left = percentX + "%";
    bahram.style.top = percentY + "%";
  }

  function selectDome(d) {
    panelTitle.textContent = `🧿 ${d.day} | ${d.dome} | ${d.planet}`;

    panelInfo.innerHTML = `
      <span class="tag">روز: ${d.day}</span>
      <span class="tag">فلک: ${d.falak}</span>
      <span class="tag">بانو: ${d.lady}</span>
      <span class="tag">رنگ: ${d.hex}</span>
      <div style="margin-top:12px;">
        🌙 داستان: ${d.story}
      </div>
      <div style="margin-top:12px;">
        پند ${d.advice}
      </div>
      

    `;

    codeBlock.textContent = generateCode(d);

    ladyImg.style.display = "block";
    ladyImg.src = d.ladyImg;

    moveBahramToOrbit(d.orbitSize);
  }
</script>

</body>
</html>
